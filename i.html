<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gujju Vibe Check ✨</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet" />

    <style>
        /* ===========================
       CSS VARIABLES & RESET
    =========================== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fdf4e3;
            --purple: #fb923c;
            --purple-dk: #ea580c;
            --pink: #f43f5e;
            --pink-dk: #e11d48;
            --white: #ffffff;
            --text: #431407;
            --text-soft: #9a3412;
            --card-r: 24px;
            --shadow: 0 8px 40px rgba(234, 88, 12, .15);
            --shadow-lg: 0 16px 60px rgba(234, 88, 12, .25);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden; /* Prevent body scroll, use screen scroll */
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        /* ===========================
       DECORATIVE BLOBS
    =========================== */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .3;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: var(--pink); bottom: -100px; right: -100px; }
        .blob-3 { width: 250px; height: 250px; background: #fde68a; top: 40%; left: 50%; transform: translate(-50%, -50%); }

        /* ===========================
       SCREENS
    =========================== */
        .screen {
            position: fixed;
            inset: 0;
            height: 100dvh; /* Dynamic viewport height for mobile */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
            transition: opacity .5s ease, transform .5s ease;
            overflow: hidden;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(.98);
        }

        /* ===========================
       INTRO SCREEN
    =========================== */
        #intro {
            gap: 24px;
            text-align: center;
        }

        .intro-emoji {
            font-size: clamp(60px, 15vw, 80px);
            animation: floaty 3s ease-in-out infinite;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .intro-made-for {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--text-soft);
            opacity: 0.8;
        }

        .intro-name {
            font-size: clamp(36px, 12vw, 56px);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--purple-dk), var(--pink-dk));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro-sub {
            font-size: clamp(15px, 4vw, 17px);
            color: var(--text-soft);
            font-weight: 500;
            max-width: 280px;
        }

        .intro-bar-container {
            width: 140px;
            height: 6px;
            background: rgba(234, 88, 12, 0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .intro-bar-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--purple), var(--pink));
            border-radius: 99px;
            animation: grow-bar 2s ease forwards;
        }

        @keyframes grow-bar {
            to { width: 100%; }
        }

        /* ===========================
       GAME SCREEN
    =========================== */
        #game {
            justify-content: flex-start;
            padding-top: calc(30px + var(--safe-top));
        }

        .progress-wrap {
            width: 100%;
            max-width: 440px;
            margin-bottom: 24px;
            z-index: 20;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-soft);
            margin-bottom: 10px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: rgba(234, 88, 12, .15);
            border-radius: 99px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--pink));
            border-radius: 99px;
            transition: width .5s cubic-bezier(.34, 1.56, .64, 1);
        }

        .card-area {
            position: relative;
            width: 100%;
            max-width: 440px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .q-card {
            position: absolute;
            width: 100%;
            background: var(--white);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: all .45s cubic-bezier(.4, 0, .2, 1);
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        .q-card.exit-left { opacity: 0; transform: translateX(-120%) rotate(-15deg); }
        .q-card.exit-right { opacity: 0; transform: translateX(120%) rotate(15deg); }
        .q-card.enter { animation: card-enter .5s cubic-bezier(.34, 1.56, .64, 1) forwards; }

        @keyframes card-enter {
            from { opacity: 0; transform: translateY(50px) scale(.9) rotate(2deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
        }

        .q-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ffedd5, #ffe4e6);
            color: var(--purple-dk);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 99px;
            align-self: flex-start;
        }

        .q-question {
            font-size: clamp(24px, 7vw, 32px);
            font-weight: 800;
            line-height: 1.25;
            color: var(--text);
            text-align: center;
            min-height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-or {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-soft);
            letter-spacing: .15em;
            text-transform: uppercase;
            gap: 12px;
            opacity: 0.6;
        }

        .choice-or::before, .choice-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--purple));
            opacity: 0.3;
        }

        .choice-or::after { transform: scaleX(-1); }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .choice-btn {
            background: #fff;
            border: 2px solid rgba(234, 88, 12, .15);
            border-radius: 24px;
            padding: 24px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all .2s ease;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .choice-btn:hover {
                border-color: var(--purple);
                background: #fffbf5;
                transform: translateY(-4px);
                box-shadow: 0 8px 20px rgba(234, 88, 12, .15);
            }
        }

        .choice-btn:active {
            transform: scale(.94);
            background: #fff1e6;
        }

        .choice-btn.chosen {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 25px rgba(234, 88, 12, .3);
        }

        .choice-btn.chosen .choice-label { color: white; }

        .choice-icon { font-size: clamp(32px, 8vw, 40px); }
        .choice-label { font-size: 15px; font-weight: 700; color: var(--text); text-align: center; }

        /* ===========================
       RESULT SCREEN
    =========================== */
        #result {
            justify-content: flex-start;
            padding-top: calc(40px + var(--safe-top));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .result-header {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--text-soft);
            margin-bottom: 20px;
        }

        .result-card {
            background: var(--white);
            border-radius: 36px;
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-emoji {
            font-size: clamp(70px, 20vw, 100px);
            animation: floaty 4s ease-in-out infinite;
        }

        .result-badge {
            background: linear-gradient(135deg, #ffedd5, #ffe4e6);
            color: var(--purple-dk);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 99px;
        }

        .result-title {
            font-size: clamp(28px, 9vw, 40px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple-dk), var(--pink-dk));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .result-desc {
            font-size: 16px;
            color: var(--text-soft);
            font-weight: 500;
            line-height: 1.6;
            text-align: center;
        }

        .cta-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--purple-dk), var(--pink-dk));
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(244, 63, 94, .3);
            transition: all .2s ease;
        }

        .cta-btn:active { transform: scale(.96); opacity: 0.9; }

        .again-btn {
            background: none;
            border: 2px solid rgba(234, 88, 12, .3);
            color: var(--text-soft);
            border-radius: 99px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s ease;
            margin-bottom: 20px;
        }

        .again-btn:active { background: rgba(234, 88, 12, .1); }

        /* ===========================
       MOBILE OPTIMIZATIONS
    =========================== */
        @media (max-width: 370px) {
            .choices { grid-template-columns: 1fr; gap: 12px; }
            .choice-btn { padding: 16px; flex-direction: row; justify-content: flex-start; }
            .choice-icon { font-size: 28px; }
            .q-card { padding: 24px 20px; gap: 16px; }
            .q-question { font-size: 22px; min-height: auto; }
        }

        @media (max-height: 700px) {
            #game { padding-top: calc(15px + var(--safe-top)); }
            .q-card { gap: 16px; padding: 20px; }
            .progress-wrap { margin-bottom: 12px; }
            .intro-emoji { font-size: 50px; }
        }
    </style>
</head>

<body>

    <!-- Decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ============================
     INTRO SCREEN
============================= -->
    <div class="screen" id="intro">
        <div class="intro-emoji">🪔</div>
        <p class="intro-made-for">Let's find out</p>
        <h1 class="intro-name">Gujju Vibe Check ✨</h1>
        <p class="intro-sub">A little game to know your true desi personality 🎀</p>
        <div class="intro-bar-container">
            <div class="intro-bar-fill"></div>
        </div>
    </div>

    <!-- ============================
     GAME SCREEN
============================= -->
    <div class="screen hidden" id="game">

        <!-- Progress bar -->
        <div class="progress-wrap">
            <div class="progress-meta">
                <span id="progress-label">Question 1 of 10</span>
                <span id="progress-pct">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- Card stack area -->
        <div class="card-area" id="card-area">
            <!-- Cards injected by JS -->
        </div>

    </div>

    <!-- ============================
     RESULT SCREEN
============================= -->
    <div class="screen hidden" id="result">
        <p class="result-header">Your vibe is…</p>
        <div class="result-card" id="result-card">
            <div class="result-emoji" id="result-emoji">🌸</div>
            <span class="result-badge" id="result-badge">Vibe Type</span>
            <h2 class="result-title" id="result-title">Result Title</h2>
            <p class="result-desc" id="result-desc">Description here.</p>
            <button class="cta-btn" id="cta-btn">
                <span>Share my Gujju Score</span> 💌
            </button>
            <span class="copied-toast" id="copied-toast">Copied to clipboard! ✓</span>
        </div>
        <button class="again-btn" id="again-btn">↺ Play again</button>
    </div>

    <script>
        /* =========================================================
           DATA: 10 Questions
           Each question has a tag, a prompt, and two choices.
           "weight" determines the result scoring:
             - choice A is more "Traditional / Cozy Gujju"
             - choice B is more "Trendy / Modern / Outgoing"
        ========================================================= */
        const questions = [
            {
                tag: "Beverage check",
                q: "What keeps you going?",
                a: { icon: "☕", label: "Kadak Masala Chai", weight: 0 },
                b: { icon: "🥛", label: "Thandi Masala Chaas", weight: 1 }
            },
            {
                tag: "Sunday Morning",
                q: "Ultimate weekend breakfast?",
                a: { icon: "🥨", label: "Fafda-Jalebi", weight: 0 },
                b: { icon: "🍛", label: "Surti Locho / Khaman", weight: 1 }
            },
            {
                tag: "Late night vibe",
                q: "It's 11 PM, where are you?",
                a: { icon: "🍧", label: "Eating Baraf Gola", weight: 1 },
                b: { icon: "🚗", label: "Long drive on SG Highway", weight: 2 }
            },
            {
                tag: "Festivity meter",
                q: "Navratri plan?",
                a: { icon: "🪔", label: "Sheri Garba", weight: 0 },
                b: { icon: "🕺", label: "VIP Passes / Party Plot", weight: 2 }
            },
            {
                tag: "Vacation goals",
                q: "Quick getaway destination?",
                a: { icon: "⛰️", label: "Mount Abu / Saputara", weight: 0 },
                b: { icon: "🏖️", label: "Spontaneous Diu/Goa", weight: 2 }
            },
            {
                tag: "Snack attack",
                q: "Mid-day hunger strikes...",
                a: { icon: "🫓", label: "Thepla & Chundo", weight: 0 },
                b: { icon: "🍔", label: "Cheese Peri-Peri Dabeli", weight: 1 }
            },
            {
                tag: "Language mode",
                q: "How do you text?",
                a: { icon: "🗣️", label: "Pure Gujju Slang", weight: 0 },
                b: { icon: "📱", label: "Hinglish + Memes", weight: 2 }
            },
            {
                tag: "Weekend plans",
                q: "Ideal Saturday night?",
                a: { icon: "🏡", label: "Family Dinner", weight: 0 },
                b: { icon: "🏏", label: "Box Cricket till 2 AM", weight: 2 }
            },
            {
                tag: "Retail therapy",
                q: "Shopping location?",
                a: { icon: "🛍️", label: "Street Shopping (Law Garden)", weight: 0 },
                b: { icon: "👗", label: "Mall Hopping / Zara", weight: 1 }
            },
            {
                tag: "Sweet cravings",
                q: "What's for dessert?",
                a: { icon: "🍮", label: "Garam Mohanthal", weight: 0 },
                b: { icon: "🍰", label: "Biscoff Cheesecake", weight: 2 }
            }
        ];

        /* =========================================================
           RESULTS: 4 vibe types based on score (Max score = 15)
        ========================================================= */
        const results = [
            {
                minScore: 0,
                maxScore: 3,
                emoji: "🪔",
                badge: "Asal Gujju",
                title: "The Asal Gujarati",
                desc: "You are pure, unadulterated Gujarati at heart. Thepla, chai, and cozy family time are your safe spaces. Don't ever change!",
                message: "I got 'The Asal Gujarati' on the Gujju Vibe Check! What does that say about me? 👀"
            },
            {
                minScore: 4,
                maxScore: 7,
                emoji: "🥨",
                badge: "Balanced Soul",
                title: "The Sweet Dhokla",
                desc: "You appreciate your roots but love a good modern twist. You can enjoy a fancy cafe just as much as a tapri ni chai.",
                message: "I got 'The Sweet Dhokla' on the Gujju Vibe Check! What does that say about me? 👀"
            },
            {
                minScore: 8,
                maxScore: 11,
                emoji: "🕺",
                badge: "The Vibe Checker",
                title: "The Navratri Rockstar",
                desc: "You are the life of the party! Always ready for a midnight gola plan, a box cricket match, or dancing till 3 AM.",
                message: "I got 'The Navratri Rockstar' on the Gujju Vibe Check! What does that say about me? 👀"
            },
            {
                minScore: 12,
                maxScore: 99,
                emoji: "🚀",
                badge: "Gen-Z Gujju",
                title: "The Modern Gujju",
                desc: "You are all about the aesthetics, latest trends, and spontaneous trips. You live for the gram and the next big adventure!",
                message: "I got 'The Modern Gujju' on the Gujju Vibe Check! What does that say about me? 👀"
            }
        ];

        /* =========================================================
           STATE
        ========================================================= */
        let currentQ = 0;
        let totalScore = 0;
        let choosing = false;

        /* =========================================================
           HELPERS: screen transitions
        ========================================================= */
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            const el = document.getElementById(id);
            el.classList.remove('hidden');
        }

        /* =========================================================
           PROGRESS BAR
        ========================================================= */
        function updateProgress(n) {
            const pct = Math.round((n / questions.length) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-label').textContent =
                `Question ${Math.min(n + 1, questions.length)} of ${questions.length}`;
            document.getElementById('progress-pct').textContent = pct + '%';
        }

        /* =========================================================
           CARD: build a question card DOM element
        ========================================================= */
        function buildCard(index) {
            const q = questions[index];
            const card = document.createElement('div');
            card.className = 'q-card enter';
            card.innerHTML = `
                <span class="q-tag">${q.tag}</span>
                <h2 class="q-question">${q.q}</h2>
                <div class="choice-or">or</div>
                <div class="choices">
                    <button class="choice-btn" data-choice="a" aria-label="${q.a.label}">
                        <span class="choice-icon">${q.a.icon}</span>
                        <span class="choice-label">${q.a.label}</span>
                    </button>
                    <button class="choice-btn" data-choice="b" aria-label="${q.b.label}">
                        <span class="choice-icon">${q.b.icon}</span>
                        <span class="choice-label">${q.b.label}</span>
                    </button>
                </div>
            `;
            return card;
        }

        /* =========================================================
           CHOICE: handle a tap/click
        ========================================================= */
        function handleChoice(card, choiceKey) {
            if (choosing) return;
            choosing = true;

            const q = questions[currentQ];
            const chosen = q[choiceKey];

            // Visual feedback: highlight chosen button
            const btns = card.querySelectorAll('.choice-btn');
            btns.forEach(b => {
                if (b.dataset.choice === choiceKey) b.classList.add('chosen');
            });

            // Accumulate score
            totalScore += chosen.weight;

            // Determine exit direction
            const exitClass = choiceKey === 'a' ? 'exit-left' : 'exit-right';

            setTimeout(() => {
                card.classList.remove('enter');
                card.classList.add(exitClass);

                setTimeout(() => {
                    card.remove();
                    currentQ++;

                    if (currentQ < questions.length) {
                        updateProgress(currentQ);
                        const nextCard = buildCard(currentQ);
                        document.getElementById('card-area').appendChild(nextCard);
                        attachCardListeners(nextCard);
                    } else {
                        showResult();
                    }

                    choosing = false;
                }, 440);
            }, 200);
        }

        function attachCardListeners(card) {
            card.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', () => handleChoice(card, btn.dataset.choice));
            });
        }

        /* =========================================================
           RESULT: compute and display
        ========================================================= */
        function showResult() {
            // Determine result based on score
            let vibe = results[results.length - 1];
            for (const r of results) {
                if (totalScore >= r.minScore && totalScore <= r.maxScore) {
                    vibe = r;
                    break;
                }
            }

            document.getElementById('result-emoji').textContent = vibe.emoji;
            document.getElementById('result-badge').textContent = vibe.badge;
            document.getElementById('result-title').textContent = vibe.title;
            document.getElementById('result-desc').textContent = vibe.desc;

            // Store message for clipboard
            document.getElementById('cta-btn').dataset.message = vibe.message;

            showScreen('result');
            launchConfetti();
        }

        /* =========================================================
           CTA: copy to clipboard
        ========================================================= */
        document.getElementById('cta-btn').addEventListener('click', function () {
            const msg = this.dataset.message || "I got a fun result on Gujju Vibe Check! 👀";
            navigator.clipboard.writeText(msg).catch(() => {
                // fallback for older browsers
                const ta = document.createElement('textarea');
                ta.value = msg;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
            const toast = document.getElementById('copied-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        });

        /* =========================================================
           PLAY AGAIN
        ========================================================= */
        document.getElementById('again-btn').addEventListener('click', () => {
            currentQ = 0;
            totalScore = 0;
            choosing = false;

            // Clear old card
            document.getElementById('card-area').innerHTML = '';

            // Reset progress
            updateProgress(0);

            // Build first card
            const firstCard = buildCard(0);
            document.getElementById('card-area').appendChild(firstCard);
            attachCardListeners(firstCard);

            showScreen('game');
        });

        /* =========================================================
           CONFETTI (pure JS, no library)
        ========================================================= */
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const colors = ['#ea580c', '#fb923c', '#f43f5e', '#e11d48', '#fde68a', '#86efac'];
            const pieces = [];
            const count = 120;

            for (let i = 0; i < count; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    vx: (Math.random() - .5) * 3,
                    vy: Math.random() * 3 + 2,
                    vr: (Math.random() - .5) * 8,
                    opacity: 1
                });
            }

            let frame;
            let elapsed = 0;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                elapsed++;
                let alive = false;

                for (const p of pieces) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.vr;
                    p.vy += .08; // gravity

                    // Fade out after 120 frames
                    if (elapsed > 120) p.opacity -= .012;
                    p.opacity = Math.max(0, p.opacity);
                    if (p.opacity > 0) alive = true;

                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }

                if (alive) {
                    frame = requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    cancelAnimationFrame(frame);
                }
            }

            draw();
        }

        /* =========================================================
           INTRO → GAME transition (2 second pause)
        ========================================================= */
        window.addEventListener('load', () => {
            // Build first card immediately (off-screen)
            const firstCard = buildCard(0);
            document.getElementById('card-area').appendChild(firstCard);
            attachCardListeners(firstCard);
            updateProgress(0);

            // After 2.2s, auto-transition to game
            setTimeout(() => {
                showScreen('game');
            }, 2200);
        });

        // Handle canvas resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
